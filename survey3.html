<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
    </head>
    <body>
        <header>
            <h3>설문지</h3>
        소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.
        <hr>
        </header>
        <section>
            <article>
                학년 <form>
            <label><input type="radio" name="grade">1학년</label>
            <label><input type="radio" name="grade">2학년</label>
            <label><input type="radio" name="grade">3학년</label>
            </form><br>       
            </article>
            <article>
                성별 <form>
            <label><input type="radio" name="manwoman">남자</label>
            <label><input type="radio" name="manwoman">여자</label>
            </form><br>
            </article>
            <article>
                관심 분야 <form>
            <select name="interest">
                <option value="1">운동</option>
                <option value="2">돈</option>
                <option value="3">패션</option>
            </select> 
            </form><br>
            </article>
            <article>
                진로 <form>
            <label><input type="checkbox">개발</label>
            <label><input type="checkbox">기획</label>
            <label><input type="checkbox">영업</label>
            <label><input type="checkbox">창업</label>
            </form><br>
            </article>
            <article>
                남기고 싶은 말 <textarea cols="40" rows="5">글을 남겨주세요.</textarea><br>
            </article>
        </section>
        <footer>Copyright 2026 by MYONGJI COLLEGE</footer>
    </body>
</html>
